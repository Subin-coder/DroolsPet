<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - PetSupply E-Commerce</title>
    <title>Shopping Cart - PetSupply E-Commerce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header>
        <nav>
            <a href="index.html" class="logo">Drools<span>Pet</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
            </ul>
            <div class="nav-right">
                <a href="cart.html" class="icon-btn cart-icon" title="Shopping Cart">
                    <i class="fa-solid fa-cart-shopping"></i><span class="cart-count"></span>
                </a>
                <div class="auth-buttons"></div>
            </div>
        </nav>
    </header>

    <!-- MAIN WRAPPER (IMPORTANT FIX) -->
    <main class="container">

        <h1 style="margin: 30px 0;">Shopping Cart</h1>

        <div class="cart-container">

            <!-- Cart Items -->
            <div class="cart-items" id="cartItems">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading cart...
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <h3>Order Summary</h3>

                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">Rs. 0</span>
                </div>

                <div class="summary-row">
                    <span>Shipping:</span>
                    <span id="shipping">Free</span>
                </div>

                <div class="summary-row">
                    <span class="summary-total">Total:</span>
                    <span class="summary-total" id="total">Rs. 0</span>
                </div>

                <button onclick="proceedToCheckout()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                    Proceed to Checkout
                </button>

                <a href="index.html" class="btn btn-outline" style="width: 100%; margin-top: 10px; text-align: center;">
                    Continue Shopping
                </a>
            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 PetSupply E-Commerce. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>

    <script>
        // Check if logged in
        if (!UIHelper.isLoggedIn()) {
            window.location.href = 'login.html';
        }

        const currentUser = APIService.getCurrentUser();
        const isAdminUser = currentUser && (currentUser.role === 'admin' || currentUser.user_type === 'admin' || currentUser.is_admin == 1);

        async function loadCart() {
            const response = await APIService.getCart();

            if (response.status === 200) {
                const cart = response.data.cart;
                const cartItemsDiv = document.getElementById('cartItems');

                if (cart.length === 0) {
                    cartItemsDiv.innerHTML =
                        '<p style="text-align:center; padding:40px;">Your cart is empty. <a href="index.html">Continue shopping</a></p>';
                } else {
                    cartItemsDiv.innerHTML = '';
                    let total = 0;

                    cart.forEach(item => {
                        const subtotal = item.price * item.quantity;
                        total += subtotal;

                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'cart-item';

                        itemDiv.innerHTML = `
                            <img src="${item.image_url}" alt="${item.name}" class="cart-item-image">
                            
                            <div class="cart-item-details">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">Rs. ${item.price}</div>
                                <div class="cart-item-quantity">
                                    <button class="qty-btn" onclick="updateQuantity(${item.product_id}, ${item.quantity - 1})">-</button>
                                    <span>${item.quantity}</span>
                                    <button class="qty-btn" onclick="updateQuantity(${item.product_id}, ${item.quantity + 1})">+</button>
                                </div>
                            </div>

                            <div style="text-align:right;">
                                <div style="font-weight:bold; margin-bottom:10px;">Rs. ${subtotal}</div>
                                <button class="btn btn-danger btn-small" onclick="removeFromCart(${item.product_id})">
                                    Remove
                                </button>
                            </div>
                        `;

                        cartItemsDiv.appendChild(itemDiv);
                    });

                    document.getElementById('subtotal').textContent = `Rs. ${total}`;
                    document.getElementById('total').textContent = `Rs. ${total}`;
                }
            }
        }

        async function updateQuantity(productId, quantity) {
            if (quantity <= 0) {
                removeFromCart(productId);
                return;
            }

            const response = await APIService.updateCartItem(productId, quantity);

            if (response.status === 200) {
                loadCart();
                UIHelper.updateCartCount();
            }
        }

        async function removeFromCart(productId) {
            const response = await APIService.removeFromCart(productId);

            if (response.status === 200) {
                UIHelper.showAlert('Item removed from cart');
                loadCart();
                UIHelper.updateCartCount();
            }
        }

        function proceedToCheckout() {
            if (isAdminUser) {
                UIHelper.showError('Admins have view-only access and cannot purchase or proceed to checkout.');
                return;
            }
            window.location.href = 'checkout.html';
        }

        loadCart();
    </script>

</body>
</html>
